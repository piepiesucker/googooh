<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Twitch Dance Widget</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');

        :root {
            --pixel-font: 'Press+Start+2P', cursive;
            --glass-white: rgba(255, 255, 255, 0.6); 
        }

        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: black;
            font-family: var(--pixel-font);
            color: var(--glass-white);
            user-select: none;
        }

        #video-element {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            object-fit: cover; z-index: -1;
        }

        /* SHAKE EFFECT */
        .shake { animation: shakeAnim 0.05s infinite; filter: brightness(1.2); }
        @keyframes shakeAnim {
            0% { transform: translate(2px, 2px); }
            50% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -2px); }
        }

        /* UI ELEMENTS */
        #header-container { position: fixed; top: 20px; right: 20px; text-align: right; }
        #song-title { font-size: 12px; margin-bottom: 5px; }
        #music-stats { font-size: 10px; margin-bottom: 10px; opacity: 0.8; }
        #streak-display { font-size: 22px; }

        #footer-container { position: fixed; bottom: 30px; width: 100%; text-align: center; }
        #time-until-next { font-size: 24px; }

        .combo-popup {
            position: absolute; font-size: 32px; color: var(--glass-white);
            pointer-events: none; animation: pixelJump 0.6s linear forwards;
        }

        @keyframes pixelJump {
            0% { transform: translateY(0); opacity: 0.8; }
            100% { transform: translateY(-120px); opacity: 0; }
        }

        #canvas-source { display: none; }
    </style>
</head>
<body>

    <video id="video-element" autoplay playsinline></video>
    <canvas id="canvas-source" width="64" height="48"></canvas>

    <div id="header-container">
        <div id="song-title">YOUTUBE ERROR (RUN ON SERVER)</div>
        <div id="music-stats">BPM: 140 | VOL: 100%</div>
        <div id="streak-display">COMBO: 0</div>
    </div>

    <div id="footer-container">
        <div id="time-until-next">00:00</div>
    </div>

    <div id="player"></div>

    <script>
        const VIDEO_ID = 'yF7-4WR8EtQ'; 
        
        // --- CALIBRATION ---
        const MOTION_SENSITIVITY = 180; // INCREASED: Higher means you must move MORE to trigger
        const BASS_THRESHOLD = 210;    // How hard the bass must hit to shake the cam
        const COMBO_RESET_TIME = 2000;

        let player, analyzer, dataArray;
        let lastFrameData = null;
        let currentCombo = 0;
        let comboResetTimer;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        document.head.appendChild(tag);

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                height: '0', width: '0', videoId: VIDEO_ID,
                playerVars: { 'autoplay': 1, 'origin': window.location.origin },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) {
            document.getElementById('song-title').innerText = player.getVideoData().title.toUpperCase();
            setInterval(updateUI, 1000);
            setupAudio();
        }

        function updateUI() {
            if (player && player.getDuration) {
                const remaining = Math.max(0, player.getDuration() - player.getCurrentTime());
                const mins = Math.floor(remaining / 60);
                const secs = Math.floor(remaining % 60);
                document.getElementById('time-until-next').innerText = 
                    `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            }
        }

        async function setupCamera() {
            const video = document.getElementById('video-element');
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                detectMotion();
                loopBassDetection();
            };
        }

        function loopBassDetection() {
            if (analyzer) {
                analyzer.getByteFrequencyData(dataArray);
                // Bass frequencies are usually in the first few indexes
                const bass = dataArray[0] + dataArray[1] + dataArray[2] / 3;
                if (bass > BASS_THRESHOLD) {
                    document.getElementById('video-element').classList.add('shake');
                } else {
                    document.getElementById('video-element').classList.remove('shake');
                }
            }
            requestAnimationFrame(loopBassDetection);
        }

        function detectMotion() {
            const video = document.getElementById('video-element');
            const canvas = document.getElementById('canvas-source');
            const ctx = canvas.getContext('2d');

            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height);

            if (lastFrameData) {
                let diff = 0;
                // Only check every 16th pixel for "Global Movement" vs "Small Noise"
                for (let i = 0; i < currentFrame.data.length; i += 16) {
                    const movement = Math.abs(currentFrame.data[i] - lastFrameData.data[i]);
                    if (movement > 50) diff++;
                }

                // Increased threshold to prevent accidental triggers
                if (diff > MOTION_SENSITIVITY) { 
                    triggerCombo(); 
                }
            }
            lastFrameData = currentFrame;
            // Slower check rate (10fps) makes it harder to spam combos
            setTimeout(() => requestAnimationFrame(detectMotion), 100); 
        }

        function triggerCombo() {
            clearTimeout(comboResetTimer);
            currentCombo++;
            document.getElementById('streak-display').innerText = `COMBO: ${currentCombo}`;

            const popup = document.createElement('div');
            popup.className = 'combo-popup';
            popup.style.left = (20 + Math.random() * 60) + '%';
            popup.style.top = (20 + Math.random() * 60) + '%';
            popup.innerText = `+${currentCombo}`;
            document.body.appendChild(popup);
            setTimeout(() => popup.remove(), 600);

            comboResetTimer = setTimeout(() => {
                currentCombo = 0;
                document.getElementById('streak-display').innerText = `COMBO: 0`;
            }, COMBO_RESET_TIME);
        }

        function setupAudio() {
            // Note: This often fails on file:// - move to a web host for bass shake!
            try {
                const context = new (window.AudioContext || window.webkitAudioContext)();
                analyzer = context.createAnalyser();
                dataArray = new Uint8Array(analyzer.frequencyBinCount);
            } catch(e) { console.error("Audio Analysis Blocked"); }
        }

        setupCamera();
    </script>
</body>
</html>
